<!DOCTYPE html>
<html manifest="offline.appcache">
<head>
	<meta name = "viewport" content = "user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" href="images/icon.png"/>
	<link rel="icon" type="image/png" href="images/icon.png" />
	<link rel="apple-touch-startup-image" media="(min-device-width: 768px) and (orientation: portrait)" href="images/splash_iPad_portrait.png" />
	<link rel="apple-touch-startup-image" media="(min-device-width: 768px) and (orientation: landscape)" href="images/splash_iPad_landscape.png" />

	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

	<title>Gomoku</title>

	<link rel="stylesheet" href="style/jquery.mobile-1.2.0.min.css" />
	<script src="js/jquery-1.8.2.min.js"></script>
	<script src="js/jquery.mobile-1.2.0.min.js"></script>

	<link rel="stylesheet" href="style/w.min.css" />
	<link rel='stylesheet' href='style/style.css' type='text/css'/>

	<script src='js/i18n.js' type='text/javascript'></script>
	<script src='js/Player.js' type='text/javascript'></script>
	<script src='js/Board.js' type='text/javascript'></script>
	<script src='js/Game.js' type='text/javascript'></script>
	<script src='js/layout.js' type='text/javascript'></script>
	<script src='js/interface.js' type='text/javascript'></script>
	<script src='js/storage.js' type='text/javascript'></script>
</head>
<body ontouchstart="">
<div class='fullscreen-wrapper' id='happy-outer'>
	<img src='images/happy.png' class='happy-face screen-center'>
</div>
<div class='fullscreen-wrapper' id='sad-outer'>
	<img src='images/sad.png' class='sad-face screen-center'>
</div>
<div data-role='page' data-theme='w' id='game-page' class='no-background'>
	<div data-role='content' class='center no-padding'>
		<div id='game-region'>
			<header class='game-ult' data-i18n='appTitle'>Gomoku</header>
			<div id='game-info' class='game-ult ui-bar ui-bar-e'>
				<span class='go black'></span>
				<span class='cont' data-i18n='gameInfo.yourTurn'>Your turn.</span>
			</div>
			<div id='main-but-group' class='game-ult'>
				<a href='#new-game' data-rel='dialog' data-role='button' data-icon="grid" data-i18n='btn.newGame'>New Game</a>
				<a href='#' id='undo-button' data-icon="back"  data-role='button' data-i18n='btn.undo'>Undo</a>
			</div>
			<div id='other-but-group' class='game-ult'>
				<a href='#help-page' id='help-button' data-icon="star" data-role='button' data-i18n='btn.about'>About</a>
			</div>
			<div class='go-board' data-enhance=false>
				
			</div>
			<table class='board' data-enhance=false>
				<tbody>
					
				</tbody>
			</table>
		</div>
	</div>
</div>
<div id='game-won' data-theme='e' data-role='dialog'>
	<div data-role='header'>
		<h4>You Win!</h4>
	</div>
	<div data-role='content'>
		<div id='win-content'>
			You have won the game! Play again?
		</div>
		<fieldset class="ui-grid-a">
			<div class="ui-block-a"><button class='back-to-game'  data-theme='c' data-i18n='btn.back'>Back</button></div>
			<div class="ui-block-b">
				<a href='#new-game' data-rel='dialog' data-role='button' data-icon="grid" data-i18n='btn.startNewGame'>
					Start A New Game
				</a>
			</div>	   
		</fieldset>
	</div>
</div>
<div id='new-game'  data-theme='e' data-role='dialog' class='long-dialog'>
	<div data-role='header'>
		<h4 data-i18n='dialog.newGame.title'>New Game</h4>
	</div>
	<div data-role='content'>
		<fieldset data-role="controlgroup"  data-theme='e' id='mode-select' data-i18n='dialog.newGame.playWith'>
			<legend>Play with</legend>
				<input type="radio" name="radio-choice-1" id="radio-choice-1" value="vshuman"/>
				<label for="radio-choice-1" data-i18n='opt.human'>Human</label>

				<input type="radio" name="radio-choice-1" id="radio-choice-2" value="vscomputer"  />
				<label for="radio-choice-2" data-i18n='opt.computer'>Computer</label>
		</fieldset> 
		
		<fieldset data-role="controlgroup" data-theme='e' id='color-select' class='vs-computer' data-i18n='dialog.newGame.color'>
			<legend>Your Color</legend>
				<input type="radio" name="radio-choice-1" id="radio-choice-2" value="black" data-theme='a'  />
				<label for="radio-choice-2" data-i18n='opt.black'>Black</label>
				
				<input type="radio" name="radio-choice-1" id="radio-choice-1" value="white" data-theme='c' />
				<label for="radio-choice-1" data-i18n='opt.white'>White</label>
		</fieldset>
		
		<fieldset data-role="controlgroup"  data-theme='e' id='level-select'  class='vs-computer' data-i18n='dialog.newGame.level'>
			<legend>Level Of Difficulty</legend>
			
				<input type="radio" name="radio-choice-1" id="radio-choice-1" value="novice" />
				<label for="radio-choice-1" data-i18n='opt.novice'>Novice</label>

				<input type="radio" name="radio-choice-1" id="radio-choice-2" value="medium"  />
				<label for="radio-choice-2" data-i18n='opt.medium'>Medium</label>

				<input type="radio" name="radio-choice-1" id="radio-choice-3" value="expert"  />
				<label for="radio-choice-3" data-i18n='opt.expert'>Expert</label>
				
		</fieldset>

		<fieldset data-role="controlgroup"  data-theme='e' id='lang-select' data-i18n='dialog.newGame.language'>
			<legend>Language</legend>

				<input type="radio" name="lang-choice" id="lang-choice-system" value="system" />
				<label for="lang-choice-system" data-i18n='opt.lang.system'>Follow system</label>

				<input type="radio" name="lang-choice" id="lang-choice-zh-cn" value="zh-CN" />
				<label for="lang-choice-zh-cn" data-i18n='opt.lang.zh-CN'>简体中文</label>

				<input type="radio" name="lang-choice" id="lang-choice-zh-hk" value="zh-HK" />
				<label for="lang-choice-zh-hk" data-i18n='opt.lang.zh-HK'>繁體中文（香港）</label>

				<input type="radio" name="lang-choice" id="lang-choice-zh-tw" value="zh-TW" />
				<label for="lang-choice-zh-tw" data-i18n='opt.lang.zh-TW'>繁體中文（台灣）</label>

				<input type="radio" name="lang-choice" id="lang-choice-en" value="en" />
				<label for="lang-choice-en" data-i18n='opt.lang.en'>English</label>

		</fieldset>

		<fieldset class="ui-grid-a">
			<div class="ui-block-a"><button class='back-to-game'  data-theme='c' data-i18n='btn.back'>Back</button></div>
			<div class="ui-block-b"><button id='start-game'  data-theme='b' data-i18n='btn.start'>Start</button></div>	   
		</fieldset>
	</div>
</div>

<div data-role='dialog' data-theme='e' id='help-page'>
	<div data-role='header'>
		<h4 data-i18n='about.title'>About</h4>
	</div>
	<div data-role='content' class='thin-content' data-i18n='about.content'>
		<p>An offline Gomoku app with HTML5 Web Worker AI.</p>
	</div>
</div>
</body>
</html>
