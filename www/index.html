<!DOCTYPE html>
<html manifest="offline.appcache">
<head>
	<meta name = "viewport" content = "user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" href="images/icon.png"/>
	<link rel="icon" type="image/png" href="images/icon.png" />
	<link rel="apple-touch-startup-image" media="(min-device-width: 768px) and (orientation: portrait)" href="images/splash_iPad_portrait.png" />
	<link rel="apple-touch-startup-image" media="(min-device-width: 768px) and (orientation: landscape)" href="images/splash_iPad_landscape.png" />

	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

	<title>Gomoku</title>

	<link rel='stylesheet' href='style/style.css' type='text/css'/>

	<script src='js/i18n.js' type='text/javascript'></script>
	<script src='js/nav.js' type='text/javascript'></script>
	<script src='js/Player.js' type='text/javascript'></script>
	<script src='js/Board.js' type='text/javascript'></script>
	<script src='js/Game.js' type='text/javascript'></script>
	<script src='js/layout.js' type='text/javascript'></script>
	<script src='js/interface.js' type='text/javascript'></script>
	<script src='js/storage.js' type='text/javascript'></script>
</head>
<body ontouchstart="">
<div class='fullscreen-wrapper' id='happy-outer'>
	<img src='images/happy.png' class='happy-face screen-center'>
</div>
<div class='fullscreen-wrapper' id='sad-outer'>
	<img src='images/sad.png' class='sad-face screen-center'>
</div>

<div id='dialog-mask'></div>

<div class='page no-background' id='game-page'>
	<div class='page-content center no-padding'>
		<div id='game-region'>
			<header class='game-ult' data-i18n='appTitle'>Gomoku</header>
			<div id='game-info' class='game-ult info-bar'>
				<span class='go black'></span>
				<span class='cont' data-i18n='gameInfo.yourTurn'>Your turn.</span>
			</div>
			<div id='main-but-group' class='game-ult'>
				<button class='btn btn--primary btn--icon-grid open-new-game' data-i18n='btn.newGame'>New Game</button>
				<button class='btn btn--secondary btn--icon-back' id='undo-button' data-i18n='btn.undo'>Undo</button>
			</div>
			<div id='other-but-group' class='game-ult'>
				<button class='btn btn--secondary btn--icon-star open-help' id='help-button' data-i18n='btn.about'>About</button>
			</div>
			<div class='go-board'>
				
			</div>
			<table class='board'>
				<tbody>
					
				</tbody>
			</table>
		</div>
	</div>
</div>

<div id='game-won' class='dialog dialog--win'>
	<div class='dialog-header'>
		<h4 data-i18n='result.youWin.title'>You Win!</h4>
	</div>
	<div class='dialog-content'>
		<div id='win-content' data-i18n='result.youWin.desc'>
			You have won the game! Play again?
		</div>
		<div class='row-2'>
			<div><button class='btn btn--secondary back-to-game' data-i18n='btn.back'>Back</button></div>
			<div>
				<button class='btn btn--primary btn--icon-grid open-new-game' data-i18n='btn.startNewGame'>
					Start A New Game
				</button>
			</div>
		</div>
	</div>
</div>

<div id='new-game' class='dialog dialog--long'>
	<div class='dialog-header'>
		<h4 data-i18n='dialog.newGame.title'>New Game</h4>
	</div>
	<div class='dialog-content'>
		<fieldset class='ctrl-group' id='mode-select'>
			<legend data-i18n='dialog.newGame.playWith'>Play with</legend>
			<input type="radio" name="mode-choice" id="mode-choice-human" value="vshuman"/>
			<label for="mode-choice-human" data-i18n='opt.human'>Human</label>

			<input type="radio" name="mode-choice" id="mode-choice-computer" value="vscomputer"/>
			<label for="mode-choice-computer" data-i18n='opt.computer'>Computer</label>
		</fieldset>

		<fieldset class='ctrl-group vs-computer' id='color-select'>
			<legend data-i18n='dialog.newGame.color'>Your Color</legend>
			<input type="radio" name="color-choice" id="color-choice-black" value="black"/>
			<label for="color-choice-black" data-i18n='opt.black'>Black</label>

			<input type="radio" name="color-choice" id="color-choice-white" value="white"/>
			<label for="color-choice-white" data-i18n='opt.white'>White</label>
		</fieldset>

		<fieldset class='ctrl-group vs-computer' id='level-select'>
			<legend data-i18n='dialog.newGame.level'>Level Of Difficulty</legend>
			<input type="radio" name="level-choice" id="level-choice-novice" value="novice"/>
			<label for="level-choice-novice" data-i18n='opt.novice'>Novice</label>

			<input type="radio" name="level-choice" id="level-choice-medium" value="medium"/>
			<label for="level-choice-medium" data-i18n='opt.medium'>Medium</label>

			<input type="radio" name="level-choice" id="level-choice-expert" value="expert"/>
			<label for="level-choice-expert" data-i18n='opt.expert'>Expert</label>
		</fieldset>

		<fieldset class='ctrl-group' id='lang-select'>
			<legend data-i18n='dialog.newGame.language'>Language</legend>

			<input type="radio" name="lang-choice" id="lang-choice-system" value="system"/>
			<label for="lang-choice-system" data-i18n='opt.lang.system'>Follow system</label>

			<input type="radio" name="lang-choice" id="lang-choice-zh-cn" value="zh-CN"/>
			<label for="lang-choice-zh-cn" data-i18n='opt.lang.zh-CN'>简体中文</label>

			<input type="radio" name="lang-choice" id="lang-choice-zh-hk" value="zh-HK"/>
			<label for="lang-choice-zh-hk" data-i18n='opt.lang.zh-HK'>繁體中文（香港）</label>

			<input type="radio" name="lang-choice" id="lang-choice-zh-tw" value="zh-TW"/>
			<label for="lang-choice-zh-tw" data-i18n='opt.lang.zh-TW'>繁體中文（台灣）</label>

			<input type="radio" name="lang-choice" id="lang-choice-en" value="en"/>
			<label for="lang-choice-en" data-i18n='opt.lang.en'>English</label>
		</fieldset>

		<div class='row-2'>
			<div><button class='btn btn--secondary back-to-game' data-i18n='btn.back'>Back</button></div>
			<div><button class='btn btn--primary' id='start-game' data-i18n='btn.start'>Start</button></div>
		</div>
	</div>
</div>

<div id='help-page' class='dialog'>
	<div class='dialog-header'>
		<h4 data-i18n='about.title'>About</h4>
	</div>
	<div class='dialog-content thin-content' data-i18n='about.content'>
		<p>An offline Gomoku app with HTML5 Web Worker AI.</p>
	</div>
	<div class='dialog-footer'>
		<button class='btn btn--secondary back-to-game' data-i18n='btn.back'>Back</button>
	</div>
</div>
</body>
</html>
